<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桜花賞2026 パドック映像比較</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
:root {
  --bg: #0e0e12;
  --s1: #16161e;
  --s2: #1e1e28;
  --bd: #2a2a3a;
  --gold: #f0c040;
  --text: #ddddef;
  --muted: #5a5a80;
  --font: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; }

.header {
  background: var(--s1);
  border-bottom: 2px solid var(--gold);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.header h1 { font-size: 14px; font-weight: 700; color: var(--gold); }
.header p { font-size: 11px; color: var(--muted); }

.controls {
  display: flex; gap: 8px; align-items: center; padding: 8px 16px;
  background: var(--s2); border-bottom: 1px solid var(--bd);
  flex-wrap: wrap;
}
.btn {
  background: var(--s1); color: var(--text); border: 1px solid var(--bd);
  padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;
  font-family: var(--font); transition: background .15s;
}
.btn:hover { background: var(--bd); }
.btn.primary { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
.btn.primary:hover { background: #e0b030; }
.btn.stop { border-color: #e05555; color: #e05555; }
.btn.stop:hover { background: #2a1a1a; }

.grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  padding: 8px;
}

.card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 4px;
  overflow: hidden;
}
.card:hover { border-color: var(--gold); }
.card.playing { border-color: var(--gold); }

.card-header {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 6px;
  background: var(--s2);
}
.num-badge {
  width: 18px; height: 18px;
  background: var(--gold); color: #000;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.horse-name { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.video-wrap {
  position: relative; aspect-ratio: 16/9; background: #000; cursor: pointer;
}
.video-wrap video {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.3);
  transition: opacity .2s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.play-icon {
  width: 28px; height: 28px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.play-icon::after {
  content: '';
  border-left: 10px solid #000;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  margin-left: 2px;
}
.loading-spinner {
  width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.8s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

.card-footer {
  padding: 3px 6px;
  display: flex; justify-content: space-between; align-items: center;
}
.time-display { font-family: monospace; font-size: 10px; color: var(--muted); }
.vol-icon { cursor: pointer; color: var(--muted); font-size: 12px; }
.vol-icon:hover { color: var(--text); }

.status-bar {
  padding: 4px 16px;
  background: var(--s2); border-top: 1px solid var(--bd);
  font-size: 10px; color: var(--muted);
  position: fixed; bottom: 0; left: 0; right: 0;
}

/* レスポンシブ */
@media (max-width: 1200px) {
  .grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 800px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <h1>🌸 桜花賞2026 パドック映像比較</h1>
  <p>2026年4月12日 阪神11R ／ 前走パドック映像 18頭</p>
</div>

<div class="controls">
  <button class="btn primary" onclick="playAll()">▶ 全頭同時再生</button>
  <button class="btn stop" onclick="stopAll()">■ 全頭停止</button>
  <button class="btn" onclick="restartAll()">⟳ 先頭に戻して再生</button>
  <span style="margin-left:8px;color:var(--muted);font-size:11px">※ 個別クリックで単独再生/停止も可能</span>
</div>

<div class="grid" id="grid"></div>
<div class="status-bar" id="status">準備中...</div>

<script>
const VIDEOS = [
  {num:"1",  name:"フェスティバルヒル",  m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/6a4630bca7d5480288d0c3fd8ff38b3d/1762233648232.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/6a4630bca7d5480288d0c3fd8ff38b3d/1762233648232.0000000.jpg"},
  {num:"2",  name:"サンアントワーヌ",    m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/78ff6ff025a342b980f41f95a352d0f6/1773029483106.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/78ff6ff025a342b980f41f95a352d0f6/1773029483106.0000000.jpg"},
  {num:"3",  name:"ディアダイヤモンド",  m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/758d400cbcdd4b42ba809d2154fcd9ac/1773637743391.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/758d400cbcdd4b42ba809d2154fcd9ac/1773637743391.0000000.jpg"},
  {num:"4",  name:"エレガンスアスク",    m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/5f66df77d40d457f98d1ce853c41877b/1772435037355.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/5f66df77d40d457f98d1ce853c41877b/1772435037355.0000000.jpg"},
  {num:"5",  name:"ギャラボーグ",        m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/71c4f64774dc470d87e42f5212386a64/1771219191038.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/71c4f64774dc470d87e42f5212386a64/1771219191038.0000000.jpg"},
  {num:"6",  name:"アイニードユー",      m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/48b73604b24a43f283ee385addc7394e/1773029476762.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/48b73604b24a43f283ee385addc7394e/1773029476762.0000000.jpg"},
  {num:"7",  name:"アランカール",        m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/a1897e41f7fd45d9bb54307e9e843de3/1772427250803.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/a1897e41f7fd45d9bb54307e9e843de3/1772427250803.0000000.jpg"},
  {num:"8",  name:"ロンギングセリーヌ",  m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/06872180961441d797515ab8cad76efd/1774238496368.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/06872180961441d797515ab8cad76efd/1774238496368.0000000.jpg"},
  {num:"9",  name:"ルールザウェイヴ",    m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/d1386c64034a495a8cd492ad791544b1/1773637724900.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/d1386c64034a495a8cd492ad791544b1/1773637724900.0000000.jpg"},
  {num:"10", name:"ナムラコスモス",      m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/aaa73be9eeec4952a509a45a90353cfa/1772427252687.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/aaa73be9eeec4952a509a45a90353cfa/1772427252687.0000000.jpg"},
  {num:"11", name:"ジッピーチューン",    m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/b5848d23aaff4f82a37a4c0f11a8ca9f/1771219186381.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/b5848d23aaff4f82a37a4c0f11a8ca9f/1771219186381.0000000.jpg"},
  {num:"12", name:"スウィートハピネス",  m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/e7982b7eb8224c4592a48447c4d56d5b/1770624188476.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/e7982b7eb8224c4592a48447c4d56d5b/1770624188476.0000000.jpg"},
  {num:"13", name:"リリージョワ",        m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/0fa32ce88e8a41369b99416cf7c93d3a/1768799017158.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/0fa32ce88e8a41369b99416cf7c93d3a/1768799017158.0000000.jpg"},
  {num:"14", name:"ドリームコア",        m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/c365304687b24ed19265e210fd4517d8/1771219192304.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/c365304687b24ed19265e210fd4517d8/1771219192304.0000000.jpg"},
  {num:"15", name:"スターアニス",        m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/23a4c845306041f7abb03569c735da00/1765782415210.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/23a4c845306041f7abb03569c735da00/1765782415210.0000000.jpg"},
  {num:"16", name:"ショウナンカリス",    m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/a3b51e31a8ef450f94059ee62bcab3ce/1773029469747.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/a3b51e31a8ef450f94059ee62bcab3ce/1773029469747.0000000.jpg"},
  {num:"17", name:"ブラックチャリス",    m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/9511699113fb43d5b9813cf9822dd747/1768278502923.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/9511699113fb43d5b9813cf9822dd747/1768278502923.0000000.jpg"},
  {num:"18", name:"プレセピオ",          m3u8:"https://race-player.netkeiba.com/5e4a7effafe26/media/e148f883836a4aca82a16922634fd54e/1773029469946.m3u8",  thumb:"https://race-player.netkeiba.com/5e4a7effafe26/thumbnail/e148f883836a4aca82a16922634fd54e/1773029469946.0000000.jpg"},
];

const players = []; // {video, hls, overlay}

function formatTime(sec){
  if(isNaN(sec)) return '0:00';
  const m=Math.floor(sec/60), s=Math.floor(sec%60);
  return m+':'+(s<10?'0':'')+s;
}

function buildCard(v, i){
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-'+i;

  card.innerHTML = `
    <div class="card-header">
      <div class="num-badge">${v.num}</div>
      <span class="horse-name">${v.name}</span>
    </div>
    <div class="video-wrap" id="wrap-${i}">
      <video id="vid-${i}" preload="none" poster="${v.thumb}" playsinline muted></video>
      <div class="overlay" id="ov-${i}">
        <div class="loading-spinner" id="spin-${i}"></div>
        <div class="play-icon" id="pi-${i}"></div>
      </div>
    </div>
    <div class="card-footer">
      <span class="time-display" id="time-${i}">0:00</span>
      <span class="vol-icon" id="vol-${i}" title="ミュート切替">🔇</span>
    </div>
  `;
  document.getElementById('grid').appendChild(card);

  const video = document.getElementById('vid-'+i);
  const overlay = document.getElementById('ov-'+i);
  const spinner = document.getElementById('spin-'+i);
  const playIcon = document.getElementById('pi-'+i);
  const timeEl = document.getElementById('time-'+i);
  const volEl = document.getElementById('vol-'+i);

  // HLS.js で初期化（遅延ロード）
  let hlsInited = false;
  function initHls(){
    if(hlsInited) return;
    hlsInited = true;
    spinner.style.display = 'block';
    playIcon.style.display = 'none';
    if(Hls.isSupported()){
      const hls = new Hls({enableWorker:true, lowLatencyMode:false});
      hls.loadSource(v.m3u8);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
        spinner.style.display = 'none';
        playIcon.style.display = '';
        players[i].ready = true;
      });
      players[i].hls = hls;
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = v.m3u8;
      spinner.style.display = 'none';
      players[i].ready = true;
    }
  }

  // クリックで再生/停止
  document.getElementById('wrap-'+i).addEventListener('click', ()=>{
    initHls();
    if(video.paused){
      video.play().catch(()=>{});
    } else {
      video.pause();
    }
  });

  // 再生状態に応じてオーバーレイ
  video.addEventListener('play', ()=>{
    overlay.classList.add('hidden');
    card.classList.add('playing');
  });
  video.addEventListener('pause', ()=>{
    overlay.classList.remove('hidden');
    card.classList.remove('playing');
  });
  video.addEventListener('ended', ()=>{
    overlay.classList.remove('hidden');
    card.classList.remove('playing');
    video.currentTime = 0;
  });
  video.addEventListener('timeupdate', ()=>{
    timeEl.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
  });
  video.addEventListener('waiting', ()=>{ spinner.style.display='block'; playIcon.style.display='none'; });
  video.addEventListener('canplay', ()=>{ spinner.style.display='none'; playIcon.style.display=''; });

  // ミュート切替（デフォルトミュート）
  video.muted = true;
  volEl.addEventListener('click', (e)=>{
    e.stopPropagation();
    video.muted = !video.muted;
    volEl.textContent = video.muted ? '🔇' : '🔊';
  });

  players[i] = {video, hls:null, ready:false, initHls};
}

function playAll(){
  players.forEach((p,i)=>{
    p.initHls();
    setTimeout(()=>{ p.video.play().catch(()=>{}); }, i*50);
  });
  updateStatus();
}

function stopAll(){
  players.forEach(p=>p.video.pause());
  updateStatus();
}

function restartAll(){
  players.forEach((p,i)=>{
    p.initHls();
    p.video.currentTime = 0;
    setTimeout(()=>{ p.video.play().catch(()=>{}); }, i*50);
  });
  updateStatus();
}

function updateStatus(){
  const playing = players.filter(p=>!p.video.paused).length;
  document.getElementById('status').textContent =
    `再生中: ${playing}頭 / 全18頭 ― HLS.js使用 ― race-player.netkeiba.com`;
}

// カード生成
VIDEOS.forEach((v,i) => buildCard(v,i));
document.getElementById('status').textContent = '準備完了 ― 「全頭同時再生」または各映像をクリックして再生';

setInterval(updateStatus, 1000);
</script>
</body>
</html>
