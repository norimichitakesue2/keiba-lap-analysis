<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阪神 芝2000m 展開タイプ×ラップタイプ 4コーナー順位分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c10; --s1:#14141c; --s2:#1a1a26; --s3:#20202e;
  --bd:#28283c; --bd2:#34344a;
  --gold:#f0c040; --blue:#5b9cf6; --green:#56d08b;
  --orange:#f09050; --red:#e05555; --purple:#a080f0;
  --text:#ddddef; --muted:#6060a0;
  --font:'Noto Sans JP',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5;}
.ph{background:var(--s1);border-bottom:2px solid var(--gold);padding:14px 22px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.ph h1{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:.06em;}
.ph p{font-size:11px;color:var(--muted);}
.chip{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;font-family:var(--mono);}
.hint-bar{background:var(--s2);border-bottom:1px solid var(--bd);padding:6px 22px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.hint-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.hdot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.container{padding:14px 18px;}
.dev-section{margin-bottom:20px;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.dev-summary{display:grid;grid-template-columns:170px 1fr;background:var(--s2);border-bottom:1px solid var(--bd);}
.dev-info{padding:12px 14px;border-right:1px solid var(--bd);display:flex;flex-direction:column;justify-content:center;gap:5px;}
.dev-name{font-size:15px;font-weight:700;letter-spacing:.05em;}
.dev-name.kinko{color:#5b9cf6;}
.dev-name.jizoku{color:#56d08b;}
.dev-name.shunpatsu{color:#f09050;}
.dev-total-num{font-family:var(--mono);font-size:19px;font-weight:500;color:var(--text);}
.dev-meta{font-family:var(--mono);font-size:10px;color:var(--muted);}
.lap-tabs{display:flex;overflow-x:auto;}
.lap-tab{flex:1;min-width:120px;padding:9px 10px;border-right:1px solid var(--bd);cursor:pointer;transition:background .12s;border-bottom:2px solid transparent;position:relative;}
.lap-tab:last-child{border-right:none;}
.lap-tab:hover{background:var(--s3);}
.lap-tab.active{background:var(--s3);border-bottom-color:var(--gold);}
.lt-name{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;margin-bottom:4px;}
.lt-win{font-family:var(--mono);font-size:14px;font-weight:500;}
.lt-row{display:flex;align-items:baseline;gap:6px;margin-bottom:2px;}
.lt-count{font-family:var(--mono);font-size:10px;color:var(--muted);}
.lt-results{font-family:var(--mono);font-size:9px;color:var(--muted);}
.lt-place{font-family:var(--mono);font-size:10px;color:var(--muted);}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle;}
.detail-panel{display:none;padding:14px 16px;background:var(--s1);border-top:1px solid var(--bd);}
.detail-panel.open{display:block;}
.dp-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.dp-badge{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:3px;}
.dp-badge.ok{background:#1a3a1a;color:var(--green);}
.dp-badge.ng{background:#3a1a1a;color:var(--red);}
.dp-badge.pending{background:#1a1a2a;color:var(--muted);}
.bars{display:flex;flex-direction:column;gap:4px;}
.bar-row{display:flex;align-items:center;gap:8px;height:22px;}
.bl{font-family:var(--mono);font-size:10px;color:var(--muted);width:40px;text-align:right;flex-shrink:0;}
.bt{flex:1;height:14px;background:var(--s2);border-radius:2px;overflow:hidden;max-width:280px;}
.bf{height:100%;border-radius:2px;}
.bm{display:flex;align-items:center;gap:7px;flex-shrink:0;width:70px;}
.bw{font-family:var(--mono);font-size:11px;font-weight:500;width:38px;text-align:right;}
.bn{font-family:var(--mono);font-size:10px;color:var(--muted);width:28px;}
.no-data{font-size:11px;color:var(--muted);font-style:italic;}
</style>
</head>

const CROSS = {
  "均衡戦": [{"label":"耐久型","total":"34","results":"2-6-3-23","winRate":"5.9%","placeRate":"32.4%"},{"label":"先行型","total":"60","results":"5-6-4-45","winRate":"8.3%","placeRate":"25.0%"},{"label":"持続型","total":"78","results":"7-7-7-57","winRate":"9.0%","placeRate":"26.9%"},{"label":"加速型","total":"59","results":"6-5-4-44","winRate":"10.2%","placeRate":"25.4%"},{"label":"終い伸び型","total":"23","results":"1-2-1-19","winRate":"4.3%","placeRate":"17.4%"}],
  "持続戦": [{"label":"耐久型","total":"9","results":"0-0-0-9","winRate":"0.0%","placeRate":"0.0%"},{"label":"先行型","total":"1","results":"0-0-0-1","winRate":"0.0%","placeRate":"0.0%"},{"label":"持続型","total":"48","results":"3-3-3-39","winRate":"6.3%","placeRate":"18.8%"},{"label":"加速型","total":"57","results":"3-3-3-48","winRate":"5.3%","placeRate":"15.8%"},{"label":"終い伸び型","total":"38","results":"2-2-2-32","winRate":"5.3%","placeRate":"15.8%"}],
  "瞬発戦": [{"label":"耐久型","total":"1","results":"0-0-0-1","winRate":"0.0%","placeRate":"0.0%"},{"label":"先行型","total":"0","results":"0-0-0-0","winRate":"0.0%","placeRate":"0.0%"},{"label":"持続型","total":"9","results":"0-0-0-9","winRate":"0.0%","placeRate":"0.0%"},{"label":"加速型","total":"34","results":"3-3-3-25","winRate":"8.8%","placeRate":"26.5%"},{"label":"終い伸び型","total":"40","results":"3-3-2-32","winRate":"7.5%","placeRate":"20.0%"}]
};

const DEV_TOTALS = {
  "均衡戦": {total:856, results:"69-69-69-649", winRate:"8.1%"},
  "持続戦": {total:848, results:"74-74-74-626", winRate:"8.7%"},
  "瞬発戦": {total:732, results:"73-69-71-519", winRate:"10.0%"}
};

const DEV_LIST = [
  {key:'均衡戦', cls:'kinko'},
  {key:'持続戦', cls:'jizoku'},
  {key:'瞬発戦', cls:'shunpatsu'},
];
const LAP_ORDER = ['耐久型','先行型','持続型','加速型','終い伸び型'];

function wc(rate){
  const v=parseFloat(rate);
  if(v>=30)return'#f0c040';
  if(v>=20)return'#f09050';
  if(v>=10)return'#5b9cf6';
  if(v>=5) return'#7060c0';
  return'#2a2a44';
}

function buildBars(rows){
  const data=(rows||[]).filter(r=>/^\d+番手$/.test(r.label));
  if(!data.length)return'<div class="no-data">サンプル数が少ないためデータなし</div>';
  const mx=Math.max(...data.map(r=>parseFloat(r.winRate||0)),0.001);
  return'<div class="bars">'+data.slice(0,12).map(r=>{
    const pct=Math.round(parseFloat(r.winRate||0)/mx*100);
    return`<div class="bar-row">
      <span class="bl">${r.label.replace('番手','番')}</span>
      <div class="bt"><div class="bf" style="width:${pct}%;background:${wc(r.winRate)}"></div></div>
      <div class="bm">
        <span class="bw" style="color:${wc(r.winRate)}">${r.winRate}</span>
        <span class="bn">${r.total}頭</span>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;font-family:var(--mono);font-size:9px;color:var(--muted);width:130px">
        <span>複 ${r.placeRate}</span>
        <span style="color:#444466">${r.results||''}</span>
      </div>
    </div>`;
  }).join('')+(data.length>12?`<div style="font-size:10px;color:var(--muted);padding-top:2px">…他${data.length-12}番手</div>`:'')+'</div>';
}

let okCount=0, totalCount=0;
const main=document.getElementById('main');

DEV_LIST.forEach(dev=>{
  const crossRows=CROSS[dev.key]||[];
  const dt=DEV_TOTALS[dev.key]||{total:0,results:'0-0-0-0',winRate:'0.0%'};
  const devRes=dt.results.split('-').map(Number);
  const devPlace=dt.total>0?((devRes[0]+devRes[1]+devRes[2])/dt.total*100).toFixed(1):'0.0';

  const sec=document.createElement('div');
  sec.className='dev-section';

  const summary=document.createElement('div');
  summary.className='dev-summary';

  const info=document.createElement('div');
  info.className='dev-info';
  info.innerHTML=`
    <div class="dev-name ${dev.cls}">${dev.key}</div>
    <div class="dev-total-num">${dt.total.toLocaleString()}<span style="font-size:11px;color:var(--muted);margin-left:4px">頭</span></div>
    <div class="dev-meta">勝率 ${dt.winRate} ／ 連対率 ${dt.total>0?((devRes[0]+devRes[1])/dt.total*100).toFixed(1):'0.0'}% ／ 複勝率 ${devPlace}%</div>
    <div class="dev-meta" style="font-size:9px;margin-top:2px">${dt.results}</div>
  `;

  const tabs=document.createElement('div');
  tabs.className='lap-tabs';

  LAP_ORDER.forEach(lap=>{
    const key=dev.key+'_'+lap;
    const lr=crossRows.find(r=>r.label===lap)||{total:'0',winRate:'0.0%',placeRate:'0.0%',results:'0-0-0-0'};
    const cdata=CORNER[key];
    totalCount++;

    let statusColor='#2a2a44';
    if(cdata){
      const s=cdata.filter(r=>/^\d+番手$/.test(r.label)).reduce((a,r)=>a+parseInt(r.total||0),0);
      if(s>0){statusColor='#56d08b';okCount++;}
      else statusColor='#e05555';
    }

    const tab=document.createElement('div');
    tab.className='lap-tab';
    tab.dataset.key=key;
    const p=(()=>{const p=(lr.results||'0-0-0-0').split('-').map(Number);const t=parseInt(lr.total||1);return((p[0]+p[1])/t*100).toFixed(1)+'%';})();
    tab.innerHTML=`
      <div class="lt-name">${lap}<span class="status-dot" style="background:${statusColor}"></span></div>
      <div class="lt-row">
        <span class="lt-win" style="color:${wc(lr.winRate)}">${lr.winRate}</span>
        <span class="lt-count">${parseInt(lr.total||0)}頭</span>
      </div>
      <div class="lt-results">${lr.results||'∞'}</div>
      <div class="lt-place" style="color:var(--muted)">連 ${p}　複 ${lr.placeRate}</div>
    `;
    tab.addEventListener('click',()=>{
      sec.querySelectorAll('.lap-tab').forEach(t=>t.classList.remove('active'));
      sec.querySelectorAll('.detail-panel').forEach(p=>p.classList.remove('open'));
      const panel=sec.querySelector(`.detail-panel[data-key="${key}"]`);
      const wasOpen=panel?.classList.contains('open');
      if(!wasOpen){tab.classList.add('active');panel?.classList.add('open');}
    });
    tabs.appendChild(tab);
  });

  summary.appendChild(info);
  summary.appendChild(tabs);
  sec.appendChild(summary);

  LAP_ORDER.forEach(lap=>{
    const key=dev.key+'_'+lap;
    const cdata=CORNER[key];
    const lr=crossRows.find(r=>r.label===lap)||{total:'0',winRate:'0.0%',placeRate:'0.0%',results:'0-0-0-0'};

    const panel=document.createElement('div');
    panel.className='detail-panel';
    panel.dataset.key=key;

    if(!cdata||cdata.filter(r=>/^\d+番手$/.test(r.label)).reduce((a,r)=>a+parseInt(r.total||0),0)===0){
      panel.innerHTML=`
        <div class="dp-title">${dev.key} × ${lap}　4コーナー順位別成績<span class="dp-badge pending">⏳ データなし</span></div>
        <div class="no-data">データなし</div>
      `;
    } else {
      const s=cdata.filter(r=>/^\d+番手$/.test(r.label)).reduce((a,r)=>a+parseInt(r.total||0),0);
      panel.innerHTML=`
        <div class="dp-title">${dev.key} × ${lap}　4コーナー順位別成績<span class="dp-badge ok">${s}頭</span></div>
        ${buildBars(cdata)}
      `;
    }
    sec.appendChild(panel);
  });

  main.appendChild(sec);
});

document.getElementById('chip').textContent=`収録 ${okCount}/${totalCount} 組`;
</script>
</body>
</html>
