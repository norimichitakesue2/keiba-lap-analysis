<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中山芝2000m 展開×ラップ×4角分析</title>
<style>
:root {
  --bg:#0c0c10; --s1:#14141c; --s2:#1a1a26; --s3:#20202e;
  --bd:#28283c; --bd2:#34344a;
  --gold:#f0c040; --blue:#5b9cf6; --green:#56d08b;
  --orange:#f09050; --red:#e05555; --purple:#a080f0;
  --text:#ddddef; --muted:#6060a0; --muted2:#444466;
  --font:'Noto Sans JP',sans-serif; --mono:'JetBrains Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh;}
.ph{background:var(--s1);border-bottom:2px solid var(--gold);padding:10px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ph h1{font-size:15px;font-weight:700;color:var(--gold);}
.ph-badge{background:var(--s2);border:1px solid var(--bd2);border-radius:4px;padding:3px 8px;font-size:11px;color:var(--blue);}
.ph-sub{font-size:11px;color:var(--muted);}
.hint-bar{background:var(--s2);border-bottom:1px solid var(--bd);padding:6px 18px;font-size:11px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;}
.leg-dot{width:10px;height:10px;border-radius:50%;}
.c-hi{background:#f0c040;} .c-mid{background:#f09050;} .c-lo{background:#5b9cf6;} .c-vlo{background:#8080c0;} .c-none{background:#28283c;border:1px solid #444;}
.container{padding:14px 12px;max-width:1800px;margin:0 auto;}
.dev-row{display:grid;grid-template-columns:180px repeat(5,1fr);gap:6px;margin-bottom:8px;}
.dev-cell{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;}
.dev-cell.dev-header{background:var(--s2);border-color:var(--bd2);}
.dev-title{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:2px;}
.dev-count{font-size:13px;color:var(--text);margin-bottom:6px;}
.dev-summary{font-size:10px;color:var(--muted);line-height:1.6;}
.lap-header{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.lap-count{font-size:11px;color:var(--muted);}
.win-big{font-size:22px;font-weight:700;margin-bottom:1px;}
.results-txt{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:3px;}
.rate-row{font-size:10px;color:var(--muted);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;}
.wr-hi{color:#f0c040;} .wr-mid{color:#f09050;} .wr-lo{color:#5b9cf6;} .wr-vlo{color:#8080c0;} .wr-none{color:#444466;}
.detail-wrap{grid-column:1/-1;display:none;}
.detail-wrap.open{display:block;}
.detail-panel{background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:14px;margin-top:4px;}
.detail-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;}
.jyuni-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;}
.jyuni-card{background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:8px 10px;}
.jyuni-label{font-size:10px;color:var(--muted);margin-bottom:3px;}
.jyuni-wr{font-size:18px;font-weight:700;}
.jyuni-results{font-size:9px;color:var(--muted);font-family:var(--mono);}
.jyuni-rates{font-size:9px;color:var(--muted);margin-top:2px;}
.lap-tab{cursor:pointer;transition:border-color .15s,background .15s;}
.lap-tab:hover{border-color:var(--bd2);background:var(--s2);}
.lap-tab.active{border-color:var(--gold) !important;background:var(--s3) !important;}
.empty-cell{display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:11px;}
@media(max-width:1100px){.dev-row{grid-template-columns:160px repeat(3,1fr);}}
@media(max-width:700px){.dev-row{grid-template-columns:1fr 1fr;}}
</style>
</head>

function calcRates(rows) {
  let a=0,b=0,c=0,d=0;
  rows.forEach(r=>{
    const p=(r.results||'').split('-');
    if(p.length===4){a+=+p[0];b+=+p[1];c+=+p[2];d+=+p[3];}
  });
  const t=a+b+c+d;
  return t>0?{wr:(a/t*100).toFixed(1),cr:((a+b)/t*100).toFixed(1),pr:((a+b+c)/t*100).toFixed(1),results:`${a}-${b}-${c}-${d}`,total:t}:{wr:'–',cr:'–',pr:'–',results:'0-0-0-0',total:0};
}
function wc(wr) {
  const v=parseFloat(wr);
  if(isNaN(v))return 'wr-none';
  if(v>=30)return 'wr-hi';
  if(v>=20)return 'wr-mid';
  if(v>=10)return 'wr-lo';
  if(v>=5)return 'wr-vlo';
  return 'wr-none';
}
function dotc(wr) {
  const v=parseFloat(wr);
  if(isNaN(v))return 'c-none';
  if(v>=30)return 'c-hi';
  if(v>=20)return 'c-mid';
  if(v>=10)return 'c-lo';
  if(v>=5)return 'c-vlo';
  return 'c-none';
}
function crStr(results) {
  const p=(results||'').split('-');
  if(p.length!==4)return '–';
  const t=p.reduce((s,x)=>s+(+x),0);
  return t>0?(((+p[0])+(+p[1]))/t*100).toFixed(1)+'%':'–';
}

    devCell.innerHTML = '<div class="dev-title">'+dev.name+'</div>'
      +'<div class="dev-count">'+dev.total+' 件</div>'
      +'<div class="dev-summary">勝率 '+devRates.wr+'% ／ 連対率 '+devRates.cr+'%<br>／ 複勝率 '+devRates.pr+'%<br>'+devRates.results+'</div>';
    row.appendChild(devCell);
    dev.laps.forEach(lap => {
      const key = dev.name+'_'+lap;
      const rows = CORNER[key]||[];
      const cell = document.createElement('div');
      if(rows.length===0) {
        cell.className='dev-cell empty-cell';
        cell.innerHTML='<div><div class="lap-header"><span class="dot c-none"></span>'+lap+'</div><div style="color:var(--muted2);font-size:10px;margin-top:4px">データなし</div></div>';
      } else {
        const rates = calcRates(rows);
        cell.className='dev-cell lap-tab'+(activeKey===key?' active':'');
        cell.dataset.key=key;
        cell.innerHTML='<div class="lap-header"><span class="dot '+dotc(rates.wr)+'"></span>'+lap+'<span class="lap-count">'+rates.total+'件</span></div>'
          +'<div class="win-big '+wc(rates.wr)+'">'+rates.wr+'<span style="font-size:12px;font-weight:400">%</span></div>'
          +'<div class="results-txt">'+rates.results+'</div>'
          +'<div class="rate-row">連 '+rates.cr+'% 複 '+rates.pr+'%</div>';
        cell.addEventListener('click', () => {
          const wasActive = activeKey===key;
          document.querySelectorAll('.lap-tab').forEach(el=>el.classList.remove('active'));
          document.querySelectorAll('.detail-wrap').forEach(el=>{el.classList.remove('open');el.innerHTML='';});
          if(wasActive){activeKey=null;return;}
          activeKey=key;
          cell.classList.add('active');
          const detailWrap = row.nextElementSibling;
          if(detailWrap&&detailWrap.classList.contains('detail-wrap')){
            detailWrap.classList.add('open');
            renderDetail(detailWrap,key,dev.name,lap);
          }
        });
      }
      row.appendChild(cell);
    });
    app.appendChild(row);
    const detailRow = document.createElement('div');
    detailRow.className='detail-wrap';
    app.appendChild(detailRow);
  });
}

function renderDetail(wrap, key, devName, lapName) {
  const rows = CORNER[key]||[];
  let cards = '';
  rows.forEach(r=>{
    cards += '<div class="jyuni-card">'
      +'<div class="jyuni-label">'+r.label+'</div>'
      +'<div class="jyuni-wr '+wc(r.winRate)+'">'+r.winRate+'</div>'
      +'<div class="jyuni-results">'+r.results+'</div>'
      +'<div class="jyuni-rates">連 '+crStr(r.results)+' 複 '+r.placeRate+'</div>'
      +'</div>';
  });
  wrap.innerHTML='<div class="detail-panel"><div class="detail-title">4コーナー順位別成績：'+devName+' × '+lapName+'</div>'
    +'<div class="jyuni-grid">'+cards+'</div></div>';
}

buildBars();

</script>
</body>
</html>
