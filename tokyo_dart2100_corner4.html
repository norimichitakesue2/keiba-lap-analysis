function barsHTML(list){if(!list||!list.length)return'<div class="no-data">データなし</div>';const maxT=Math.max(...list.map(x=>x.T));return list.map(row=>{const pct=Number(row.P);const barW=Math.round(row.T/maxT*100);const col=barColor(pct);return'<div class="bar-row"><span class="bl">'+row.I+'番手</span><div class="bt"><div class="bf" style="width:'+barW+'%;background:'+col+'"></div></div><span class="bm"><span class="bw">'+row.P.toFixed(1)+'%</span><span class="bn">('+row.T+')</span></span><span class="br">'+row.K+'｜勝 '+row.W.toFixed(1)+'%／連 '+row.D.toFixed(1)+'%</span></div>'}).join("")}
function badge(pct){const v=parseFloat(pct);if(v>=20)return'<span class="dp-badge ok">'+pct+'</span>';if(v>=10)return'<span class="dp-badge pending">'+pct+'</span>';return'<span class="dp-badge ng">'+pct+'</span>'}
function render(){const root=document.getElementById('root');root.innerHTML=DEV.map((dev,di)=>{const lapTabs=dev.laps.map((lap,li)=>{const dot=statusDot(parseFloat(lap.showRate));return'<div class="lap-tab" data-dev="'+di+'" data-lap="'+li+'"><div class="lt-name">'+lap.name+'<span class="status-dot" style="background:'+dot+'"></span></div><div class="lt-row"><span class="lt-win">'+lap.winRate+'</span><span class="lt-count">'+lap.total+'件</span></div><div class="lt-results">'+lap.results+'</div><div class="lt-place">連 '+lap.placeRate+'　複 '+lap.showRate+'</div></div>'}).join("");const panels=dev.laps.map((lap,li)=>{const key=dev.name+"_"+lap.name;const data=CORNER[key]||[];return'<div class="detail-panel" data-dev="'+di+'" data-lap="'+li+'"><div class="dp-title"><span>'+dev.name+' × '+lap.name+'　4コーナー順位別成績</span>'+badge(lap.showRate)+'<span style="color:var(--muted);font-family:var(--mono);font-size:10px">n='+lap.total+'</span></div><div class="bars">'+barsHTML(data)+'</div></div>'}).join("");return'<div class="dev-section"><div class="dev-summary"><div class="dev-info"><div class="dev-name '+dev.cls+'">'+dev.name+'</div><div class="dev-total-num">'+dev.total.toLocaleString()+'<span style="font-size:10px;color:var(--muted);margin-left:6px">件 '+dev.pct+'</span></div><div class="dev-meta">勝率 '+dev.winRate+' ／ 連対率 '+dev.placeRate+' ／ 複勝率 '+dev.showRate+'</div><div class="dev-meta">'+dev.results+'</div></div><div class="lap-tabs">'+lapTabs+'</div></div>'+panels+'</div>'}).join("");root.querySelectorAll('.lap-tab').forEach(tab=>{tab.addEventListener('click',()=>{const di=tab.dataset.dev,li=tab.dataset.lap;const section=tab.closest('.dev-section');const wasActive=tab.classList.contains('active');section.querySelectorAll('.lap-tab').forEach(t=>t.classList.remove('active'));section.querySelectorAll('.detail-panel').forEach(p=>p.classList.remove('open'));if(!wasActive){tab.classList.add('active');const panel=section.querySelector('.detail-panel[data-dev="'+di+'"][data-lap="'+li+'"]');panel.classList.add('open')}})});root.querySelectorAll('.dev-section').forEach(sec=>{const first=sec.querySelector('.lap-tab');if(first)first.click()})}
render();</script>
</body>
