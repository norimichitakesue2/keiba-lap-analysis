<style>:root{--bg:#0c0c10;--s1:#14141c;--s2:#1a1a26;--s3:#20202e;--bd:#28283c;--bd2:#34344a;--gold:#f0c040;--blue:#5b9cf6;--green:#56d08b;--orange:#f09050;--red:#e05555;--purple:#a080f0;--text:#ddddef;--muted:#6060a0;--muted2:#444466;--font:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.5}a{color:inherit}.ph{background:var(--s1);border-bottom:2px solid var(--gold);padding:14px 22px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}.ph h1{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:.06em}.ph p{font-size:11px;color:var(--muted)}.ph a.back{font-size:11px;color:var(--muted);text-decoration:none;margin-right:4px}.ph a.back:hover{color:var(--gold)}.chip{background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;font-family:var(--mono)}.hint-bar{background:var(--s2);border-bottom:1px solid var(--bd);padding:6px 22px;display:flex;gap:16px;flex-wrap:wrap;align-items:center}.hint-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}.hdot{width:8px;height:8px;border-radius:2px;flex-shrink:0}.container{padding:14px 18px}.dev-section{margin-bottom:20px;border:1px solid var(--bd);border-radius:8px;overflow:hidden}.dev-summary{display:grid;grid-template-columns:170px 1fr;background:var(--s2);border-bottom:1px solid var(--bd)}.dev-info{padding:12px 14px;border-right:1px solid var(--bd);display:flex;flex-direction:column;justify-content:center;gap:5px}.dev-name{font-size:15px;font-weight:700;letter-spacing:.05em}.dev-name.shunpatsu{color:#f0c040}.dev-name.kinko{color:#5b9cf6}.dev-name.jizoku{color:#56d08b}.dev-name.mae{color:#f09050}.dev-name.hpdura{color:#a080f0}.dev-name.hpcon{color:#e05555}.dev-total-num{font-family:var(--mono);font-size:19px;font-weight:500;color:var(--text)}.dev-meta{font-family:var(--mono);font-size:10px;color:var(--muted)}.lap-tabs{display:flex;overflow-x:auto}.lap-tab{flex:1 1 0;min-width:120px;padding:9px 10px;border-right:1px solid var(--bd);cursor:pointer;transition:background .12s;border-bottom:2px solid transparent;position:relative}.lap-tab:last-child{border-right:none}.lap-tab:hover{background:var(--s3)}.lap-tab.active{background:var(--s3);border-bottom-color:var(--gold)}.lt-name{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;margin-bottom:4px}.lt-win{font-family:var(--mono);font-size:14px;font-weight:500}.lt-row{display:flex;align-items:baseline;gap:6px;margin-bottom:2px}.lt-count{font-family:var(--mono);font-size:10px;color:var(--muted)}.lt-results{font-family:var(--mono);font-size:9px;color:var(--muted)}.lt-place{font-family:var(--mono);font-size:10px;color:var(--muted)}.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle}.detail-panel{display:none;padding:14px 16px;background:var(--s1);border-top:1px solid var(--bd)}.detail-panel.open{display:block}.dp-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:10px}.dp-badge{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:3px}.dp-badge.ok{background:#1a3a1a;color:var(--green)}.dp-badge.ng{background:#3a1a1a;color:var(--red)}.dp-badge.pending{background:#1a1a2a;color:var(--muted)}.bars{display:flex;flex-direction:column;gap:4px}.bar-row{display:flex;align-items:center;gap:8px;height:22px}.bl{font-family:var(--mono);font-size:10px;color:var(--muted);width:40px;text-align:right;flex-shrink:0}.bt{flex:1 1 0;height:14px;background:var(--s2);border-radius:2px;overflow:hidden;max-width:280px}.bf{height:100%;border-radius:2px}.bm{display:flex;align-items:center;gap:7px;flex-shrink:0;width:70px}.bw{font-family:var(--mono);font-size:11px;font-weight:500;width:38px;text-align:right}.bn{font-family:var(--mono);font-size:10px;color:var(--muted);width:28px}.br{font-family:var(--mono);font-size:9px;color:var(--muted)}.no-data{font-size:11px;color:var(--muted);font-style:italic}</style>

<script>const CORNER = {"前残り戦_耐久型":[{"I":9,"T":1,"K":"0-0-1-0","W":0,"D":0,"P":100},{"I":13,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0}],"前残り戦_先行型":[{"I":1,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":2,"T":1,"K":"0-1-0-0","W":0,"D":100,"P":100},{"I":3,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":4,"T":2,"K":"1-0-0-1","W":50,"D":50,"P":50},{"I":6,"T":3,"K":"0-0-0-3","W":0,"D":0,"P":0},{"I":10,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":11,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":13,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":15,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":16,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0}],"加速戦_耐久型":[{"I":4,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":5,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0}],"加速戦_終い伸び型":[{"I":12,"T":1,"K":"0-1-0-0","W":0,"D":100,"P":100},{"I":14,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0}],"加速戦_先行型":[{"I":2,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":5,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":7,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":9,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":10,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0}],"加速戦_加速型":[{"I":2,"T":1,"K":"1-0-0-0","W":100,"D":100,"P":100},{"I":7,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":10,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":12,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":15,"T":2,"K":"0-0-0-2","W":0,"D":0,"P":0}],"ロングスパート戦_先行型":[{"I":11,"T":3,"K":"0-0-0-3","W":0,"D":0,"P":0},{"I":15,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0}],"ロングスパート戦_加速型":[{"I":1,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":2,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0},{"I":3,"T":2,"K":"0-0-1-1","W":0,"D":0,"P":50},{"I":5,"T":1,"K":"1-0-0-0","W":100,"D":100,"P":100},{"I":8,"T":3,"K":"0-1-0-2","W":0,"D":33.3,"P":33.3},{"I":11,"T":1,"K":"0-0-0-1","W":0,"D":0,"P":0}]};
const DEV = [{"name":"前残り戦","cls":"mae","total":17,"pct":"27.0%","results":"1-1-1-14","winRate":"5.9%","placeRate":"11.8%","showRate":"17.7%","laps":[{"name":"先行型","total":14,"results":"1-1-0-12","winRate":"7.1%","placeRate":"14.3%","showRate":"14.3%"},{"name":"耐久型","total":2,"results":"0-0-1-1","winRate":"0.0%","placeRate":"0.0%","showRate":"50.0%"},{"name":"加速型","total":1,"results":"0-0-0-1","winRate":"0.0%","placeRate":"0.0%","showRate":"0.0%"}]},{"name":"加速戦","cls":"kinko","total":17,"pct":"27.0%","results":"1-1-1-14","winRate":"5.9%","placeRate":"11.8%","showRate":"17.7%","laps":[{"name":"加速型","total":6,"results":"1-0-0-5","winRate":"16.7%","placeRate":"16.7%","showRate":"16.7%"},{"name":"先行型","total":5,"results":"0-0-0-5","winRate":"0.0%","placeRate":"0.0%","showRate":"0.0%"},{"name":"終い伸び型","total":3,"results":"0-1-0-2","winRate":"0.0%","placeRate":"33.3%","showRate":"33.3%"},{"name":"耐久型","total":2,"results":"0-0-0-2","winRate":"0.0%","placeRate":"0.0%","showRate":"0.0%"},{"name":"持続型","total":1,"results":"0-0-1-0","winRate":"0.0%","placeRate":"0.0%","showRate":"100.0%"}]},{"name":"ロングスパート戦","cls":"kinko","total":15,"pct":"23.8%","results":"1-1-1-12","winRate":"6.7%","placeRate":"13.3%","showRate":"20.0%","laps":[{"name":"加速型","total":9,"results":"1-1-1-6","winRate":"11.1%","placeRate":"22.2%","showRate":"33.3%"},{"name":"先行型","total":4,"results":"0-0-0-4","winRate":"0.0%","placeRate":"0.0%","showRate":"0.0%"},{"name":"耐久型","total":1,"results":"0-0-0-1","winRate":"0.0%","placeRate":"0.0%","showRate":"0.0%"},{"name":"持続型","total":1,"results":"0-0-0-1","winRate":"0.0%","placeRate":"0.0%","showRate":"0.0%"}]}];
function barColor(p){if(p>=30)return"var(--green)";if(p>=20)return"var(--gold)";if(p>=10)return"var(--orange)";return"var(--muted2)"}
function statusDot(p){if(p>=20)return"var(--green)";if(p>=10)return"var(--gold)";if(p>=5)return"var(--orange)";return"var(--muted2)"}
function barsHTML(list){if(!list||!list.length)return'<div class="no-data">データなし</div>';const maxT=Math.max(...list.map(x=>x.T));return list.map(row=>{const pct=Number(row.P);const barW=Math.round(row.T/maxT*100);const col=barColor(pct);return'<div class="bar-row"><span class="bl">'+row.I+'番手</span><div class="bt"><div class="bf" style="width:'+barW+'%;background:'+col+'"></div></div><span class="bm"><span class="bw">'+row.P.toFixed(1)+'%</span><span class="bn">('+row.T+')</span></span><span class="br">'+row.K+'｜勝 '+row.W.toFixed(1)+'%／連 '+row.D.toFixed(1)+'%</span></div>'}).join("")}
function badge(pct){const v=parseFloat(pct);if(v>=20)return'<span class="dp-badge ok">'+pct+'</span>';if(v>=10)return'<span class="dp-badge pending">'+pct+'</span>';return'<span class="dp-badge ng">'+pct+'</span>'}
function render(){const root=document.getElementById('root');root.innerHTML=DEV.map((dev,di)=>{const lapTabs=dev.laps.map((lap,li)=>{const dot=statusDot(parseFloat(lap.showRate));return'<div class="lap-tab" data-dev="'+di+'" data-lap="'+li+'"><div class="lt-name">'+lap.name+'<span class="status-dot" style="background:'+dot+'"></span></div><div class="lt-row"><span class="lt-win">'+lap.winRate+'</span><span class="lt-count">'+lap.total+'件</span></div><div class="lt-results">'+lap.results+'</div><div class="lt-place">連 '+lap.placeRate+'　複 '+lap.showRate+'</div></div>'}).join("");const panels=dev.laps.map((lap,li)=>{const key=dev.name+"_"+lap.name;const data=CORNER[key]||[];return'<div class="detail-panel" data-dev="'+di+'" data-lap="'+li+'"><div class="dp-title"><span>'+dev.name+' × '+lap.name+'　4コーナー順位別成績</span>'+badge(lap.showRate)+'<span style="color:var(--muted);font-family:var(--mono);font-size:10px">n='+lap.total+'</span></div><div class="bars">'+barsHTML(data)+'</div></div>'}).join("");return'<div class="dev-section"><div class="dev-summary"><div class="dev-info"><div class="dev-name '+dev.cls+'">'+dev.name+'</div><div class="dev-total-num">'+dev.total.toLocaleString()+'<span style="font-size:10px;color:var(--muted);margin-left:6px">件 '+dev.pct+'</span></div><div class="dev-meta">勝率 '+dev.winRate+' ／ 連対率 '+dev.placeRate+' ／ 複勝率 '+dev.showRate+'</div><div class="dev-meta">'+dev.results+'</div></div><div class="lap-tabs">'+lapTabs+'</div></div>'+panels+'</div>'}).join("");root.querySelectorAll('.lap-tab').forEach(tab=>{tab.addEventListener('click',()=>{const di=tab.dataset.dev,li=tab.dataset.lap;const section=tab.closest('.dev-section');const wasActive=tab.classList.contains('active');section.querySelectorAll('.lap-tab').forEach(t=>t.classList.remove('active'));section.querySelectorAll('.detail-panel').forEach(p=>p.classList.remove('open'));if(!wasActive){tab.classList.add('active');const panel=section.querySelector('.detail-panel[data-dev="'+di+'"][data-lap="'+li+'"]');panel.classList.add('open')}})});root.querySelectorAll('.dev-section').forEach(sec=>{const first=sec.querySelector('.lap-tab');if(first)first.click()})}
render();</script>
