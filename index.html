<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展開×ラップ×4角分析 コース一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c10; --s1:#14141c; --s2:#1a1a26;
  --bd:#28283c; --bd2:#34344a;
  --gold:#f0c040; --blue:#5b9cf6; --green:#56d08b;
  --text:#dddddf; --muted:#606090;
  --font:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.header{background:var(--s1);border-bottom:2px solid var(--gold);padding:16px 24px;}
.header h1{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:4px;}
.header p{font-size:12px;color:var(--muted);}
.container{padding:20px 16px;max-width:1200px;margin:0 auto;}
.section-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--bd);}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:32px;}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:16px;text-decoration:none;color:var(--text);transition:border-color .15s,background .15s;display:block;}
.card:hover{border-color:var(--gold);background:var(--s2);}
.card-badge{display:inline-block;background:var(--s2);border:1px solid var(--bd2);border-radius:4px;padding:2px 8px;font-size:10px;color:var(--blue);margin-bottom:8px;}
.card-title{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:4px;}
.card-sub{font-size:11px;color:var(--muted);margin-bottom:8px;}
.card-stats{font-size:11px;color:var(--text);}
</style>
</head>
<body>
<div class="header">
  <h1>展開×ラップ×4角分析</h1>
  <p>コース別の展開タイプ・ラップタイプ・4コーナー順位データ</p>
</div>
<div class="container">
  <div class="section-title">中山競馬場</div>
  <div class="cards">
    <a href="nakayama_1600_corner4.html" class="card">
      <div class="card-badge">4角順位</div>
      <div class="card-title">中山芝1600m</div>
      <div class="card-sub">展開×ラップ×4コーナー順位分析</div>
      <div class="card-stats">均衡戦・持続戦・HP消耗戦ほる</div>
    </a>
    <a href="nakayama_2000_corner4.html" class="card">
      <div class="card-badge">4角順位</div>
      <div class="card-title">中山芝2000m</div>
      <div class="card-sub">展開×ラップ×4コーナー順位分析</div>
      <div class="card-stats">均衡戦1896 持続戦1087 瞬発戦778</div>
    </a>
  </div>
  <div class="section-title">福島競馬場</div>
  <div class="cards">
    <a href="fukushima_1800_corner4.html" class="card">
      <div class="card-badge">4角順位</div>
      <div class="card-title">福島芝1800m</div>
      <div class="card-sub">展開×ラップ×4コーナー順位分析</div>
      <div class="card-stats">均衡戦1414 持続戦510 瞬発戦271</div>
    </a>
  </div>
</div>
</body>
</html>
