<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>京葉S(L) 前走映像 2026/4/19 中山10R</title><script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script><style>:root{--bg:#0e0e12;--s1:#16161e;--s2:#1e1e28;--s3:#252535;--bd:#2a2a3a;--bd2:#3a3a55;--gold:#f0c040;--blue:#5b9cf6;--red:#e05555;--orange:#f09840;--text:#ddddef;--muted:#5a5a80;--font:'Hiragino Sans','Noto Sans JP',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:12px;display:flex;flex-direction:column;}
.header{background:var(--s1);border-bottom:2px solid var(--gold);padding:8px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0;}
.header h1{font-size:14px;font-weight:700;color:var(--gold);}
.controls{display:flex;gap:6px;align-items:center;padding:6px 14px;background:var(--s2);border-bottom:1px solid var(--bd);flex-wrap:wrap;flex-shrink:0;}
.btn{background:var(--s1);color:var(--text);border:1px solid var(--bd);padding:5px 13px;border-radius:4px;cursor:pointer;font-size:12px;font-family:var(--font);transition:background .12s;white-space:nowrap;}
.btn:hover{background:var(--bd);}.btn.primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}
.btn.danger{border-color:var(--red);color:var(--red);}.btn.loop-on{border-color:var(--orange);color:var(--orange);background:#1e1508;}
.sep{width:1px;background:var(--bd);height:22px;margin:0 4px;}
.grid-wrap{flex:1;overflow-y:auto;padding:8px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
@media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr);}}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:6px;overflow:hidden;transition:border-color .15s;}
.card:hover{border-color:var(--bd2);}.card.playing{border-color:var(--gold);}
.card-header{display:flex;align-items:center;gap:5px;padding:5px 8px;background:var(--s2);border-bottom:1px solid var(--bd);}
.num-badge{width:20px;height:20px;min-width:20px;background:var(--gold);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.horse-name{font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prev-info{font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.video-wrap{position:relative;aspect-ratio:16/9;background:#000;cursor:pointer;}
.video-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);transition:opacity .2s;}
.overlay.hidden{opacity:0;pointer-events:none;}
.play-circle{width:36px;height:36px;background:rgba(255,255,255,0.85);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.play-circle::after{content:'';border-left:13px solid #000;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px;}
.loop-badge{position:absolute;top:4px;right:4px;background:var(--orange);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;display:none;}
.card.looping .loop-badge{display:block;}
.spinner{width:22px;height:22px;border:2px solid rgba(255,255,255,0.25);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.card-footer{padding:3px 8px;display:flex;align-items:center;gap:6px;background:var(--s2);border-top:1px solid var(--bd);}
.time-disp{font-family:monospace;font-size:10px;color:var(--muted);flex:1;}
.vol-btn{cursor:pointer;font-size:13px;}</style></head><body><div class="header"><h1>京葉S(L) 前走映像 2026/4/19 中山10R</h1><span style="font-size:11px;color:var(--muted)">2026年4月19日(土) 中山10R 京葉ステークス(L) ダ1200m 15頭</span></div><div class="controls"><button class="btn primary" onclick="playAll()">▶ 全頭同時再生</button><button class="btn danger" onclick="stopAll()">■ 全停止</button><div class="sep"></div><button class="btn loop-on" id="loopBtn" onclick="toggleLoop()">🔁 ループ OFF</button><div class="sep"></div><button class="btn" onclick="muteAll()">🔇 全ミュート</button></div><div class="grid-wrap"><div class="grid" id="grid"></div></div><script>const HORSES=[{"num":"1","name":"ポッドベイダー","prev":"大和Ｓ 1着 26/2/10 京都ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/61700_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/4ecb3bfd2aa548138c2fa46194316707/1770867004296.m3u8"},{"num":"2","name":"エコロエイト","prev":"ブラッドST 1着 26/3/28 中山ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/68561_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/ebeacd99d25e4acea2b342d7b5af8615/1774845940003.m3u8"},{"num":"3","name":"ムーヴ","prev":"千葉Ｓ 2着 26/3/22 中山ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/67377_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/1f6f111115e04e40a2b67a3b288293fb/1774240445287.m3u8"},{"num":"4","name":"ジュンウィンダム","prev":"ポラリスＳ 13着 26/4/4 阪神ダ1400","thumb":"https://cdn.netkeiba.com/img/paddock/2026/69836_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/0cfa609159f94137a8795557380392f1/1775458291524.m3u8"},{"num":"5","name":"エスカル","prev":"大和Ｓ 6着 26/2/10 京都ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/61710_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/12475bfcd82f463cada265473de2190e/1770867020308.m3u8"},{"num":"6","name":"ワールズコライド","prev":"ジャニュアリS 16着 26/1/18 中山ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/58135_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/5016a7c422944539a160f5f98fb53aea/1768799406827.m3u8"},{"num":"7","name":"コンクイスタ","prev":"令月Ｓ 1着 26/2/22 阪神ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/63822_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/83ea9c0c1fba482e9fbec15a4807d1c4/1771822048912.m3u8"},{"num":"8","name":"トリリオンボーイ","prev":"コーラルＳ 10着 26/3/14 阪神ダ1400","thumb":"https://cdn.netkeiba.com/img/paddock/2026/66625_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/a8a003863a7f41b09fbfc87b293ce446/1773638578050.m3u8"},{"num":"9","name":"スリーピース","prev":"卯月Ｓ 1着 26/4/11 中山ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/70677_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/bb5e96678fde4db286073cd22e00f928/1776051695448.m3u8"},{"num":"10","name":"エティエンヌ","prev":"大和Ｓ 7着 26/2/10 京都ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/61704_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/59803d5b874f4eb1921ad33cf4d0d0bd/1770867006549.m3u8"},{"num":"11","name":"モンドプリューム","prev":"ジャニュアリS 1着 26/1/18 中山ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/58134_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/5675f7b12e084f9d87eccb89fd8c1e0a/1768799406160.m3u8"},{"num":"12","name":"ナムラフランク","prev":"コーラルＳ 12着 26/3/14 阪神ダ1400","thumb":"https://cdn.netkeiba.com/img/paddock/2026/66616_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/5c1503625edd4ea7a57a353cd5c6ac6c/1773638571175.m3u8"},{"num":"13","name":"マニバドラ","prev":"大和Ｓ 13着 26/2/10 京都ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/61696_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/be8b59b8b29a4a97b03b5d98f27c0eb4/1770866998259.m3u8"},{"num":"14","name":"スマートフォルス","prev":"大和Ｓ 5着 26/2/10 京都ダ1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/61709_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/31d9a71a46224c15abba2e5d2138f18e/1770867017152.m3u8"},{"num":"15","name":"カズゴルティス","prev":"カーバンクルS 8着 26/1/17 中山芝1200","thumb":"https://cdn.netkeiba.com/img/paddock/2026/58344_0.jpg?2019073001","m3u8":"https://race-player.netkeiba.com/5e4a7effafe26/media/cba0034291634327b3ea80f0638e48b2/1768804109575.m3u8"}];
const players=[];let globalLoop=false;
function fmtTime(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+':'+(ss<10?'0':'')+ss;}
HORSES.forEach((v,i)=>{
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="card-header"><div class="num-badge">'+v.num+'</div><div style="flex:1;min-width:0"><div class="horse-name">'+v.name+'</div><div class="prev-info">'+(v.prev||'')+'</div></div></div><div class="video-wrap" id="vw'+i+'"><video id="vid'+i+'" preload="none" playsinline></video><div class="overlay" id="ov'+i+'"><div class="spinner" id="sp'+i+'"></div><div class="play-circle" id="pc'+i+'"></div></div><div class="loop-badge">LOOP</div></div><div class="card-footer"><span class="time-disp" id="td'+i+'">0:00</span><span class="vol-btn" onclick="toggleMute('+i+')">🔊</span></div>';
  document.getElementById('grid').appendChild(card);
  const video=document.getElementById('vid'+i),ov=document.getElementById('ov'+i),sp=document.getElementById('sp'+i),pc=document.getElementById('pc'+i);
  players[i]={video,card,inited:false,hls:null};
  function initHls(){if(players[i].inited)return;players[i].inited=true;sp.style.display='block';pc.style.display='none';if(Hls.isSupported()){const hls=new Hls({enableWorker:true});hls.loadSource(v.m3u8);hls.attachMedia(video);hls.on(Hls.Events.MANIFEST_PARSED,()=>{sp.style.display='none';pc.style.display='';});players[i].hls=hls;}else if(video.canPlayType('application/vnd.apple.mpegurl')){video.src=v.m3u8;sp.style.display='none';}}
  document.getElementById('vw'+i).addEventListener('click',()=>{initHls();if(video.paused){video.play().catch(()=>{});card.classList.add('playing');ov.classList.add('hidden');}else{video.pause();card.classList.remove('playing');ov.classList.remove('hidden');}});
  video.addEventListener('timeupdate',()=>{document.getElementById('td'+i).textContent=fmtTime(video.currentTime)+(video.duration?' / '+fmtTime(video.duration):'');});
  video.addEventListener('ended',()=>{if(globalLoop){video.currentTime=0;video.play().catch(()=>{});}else{card.classList.remove('playing');ov.classList.remove('hidden');}});
});
function playAll(){players.forEach((p,i)=>{if(!p.inited){p.inited=true;const sp=document.getElementById('sp'+i),pc=document.getElementById('pc'+i);sp.style.display='block';pc.style.display='none';if(Hls.isSupported()){const hls=new Hls({enableWorker:true});hls.loadSource(HORSES[i].m3u8);hls.attachMedia(p.video);hls.on(Hls.Events.MANIFEST_PARSED,()=>{sp.style.display='none';pc.style.display='';p.video.play().catch(()=>{});p.card.classList.add('playing');document.getElementById('ov'+i).classList.add('hidden');});p.hls=hls;}else if(p.video.canPlayType('application/vnd.apple.mpegurl')){p.video.src=HORSES[i].m3u8;p.video.play().catch(()=>{});}}else{p.video.play().catch(()=>{});p.card.classList.add('playing');document.getElementById('ov'+i).classList.add('hidden');}});}
function stopAll(){players.forEach((p,i)=>{p.video.pause();p.card.classList.remove('playing');document.getElementById('ov'+i).classList.remove('hidden');});}
function toggleLoop(){globalLoop=!globalLoop;document.getElementById('loopBtn').textContent='🔁 ループ '+(globalLoop?'ON':'OFF');document.getElementById('loopBtn').style.color=globalLoop?'var(--orange)':'';}
function muteAll(){players.forEach(p=>{p.video.muted=!p.video.muted;});}
function toggleMute(i){players[i].video.muted=!players[i].video.muted;}</script></body></html>
